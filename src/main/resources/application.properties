# DATABASE CONFIG
spring.datasource.url=jdbc:mysql://localhost:3306/logibridge?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=dev_user
spring.datasource.password=Dev@2026#

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# HIKARI (Connection Pool)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=LogiBridgePool

# JWT CONFIG
auth.jwt.secret=ZmFrZV9zZWNyZXRfZm9yX2Rldl9vbmx5X2RvX25vdF91c2VfaW5fcHJvZA==
auth.jwt.expiration=900000

# SERVER CONFIG
server.port=8080
server.error.include-message=never
server.error.include-binding-errors=never

# LOGGING
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# JACKSON
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# SWAGGER
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true